name: CI/CD Pipeline

on:
  push:
    branches: [main]

env:
  DOCKER_IMAGE: suresheggogi/web-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ env.SHORT_SHA }}

      - name: Cleanup old DockerHub tags (keep last 10)
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          TOKEN=$(curl -s -H "Content-Type: application/json" \
            -X POST -d '{"username":"'"$DOCKER_USERNAME"'","password":"'"$DOCKER_PASSWORD"'"}' \
            https://hub.docker.com/v2/users/login/ | jq -r .token)

          TAGS=$(curl -s -H "Authorization: JWT $TOKEN" \
            "https://hub.docker.com/v2/repositories/${{ env.DOCKER_IMAGE }}/tags/?page_size=100" \
            | jq -r '.results | sort_by(.last_updated) | .[].name' | grep -v latest || true)

          COUNT=$(echo "$TAGS" | wc -l)
          if [ "$COUNT" -gt 10 ]; then
            echo "$TAGS" | head -n $((COUNT - 10)) | while read tag; do
              curl -s -X DELETE -H "Authorization: JWT $TOKEN" \
                "https://hub.docker.com/v2/repositories/${{ env.DOCKER_IMAGE }}/tags/$tag/"
              echo "Deleted DockerHub tag: $tag"
            done
          else
            echo "Only $COUNT non-latest tags, no cleanup needed"
          fi

      - name: Deploy to remote server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22222
          envs: DOCKER_USERNAME,DOCKER_PASSWORD
          script: |
            echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

            cd /root

            sed -i 's|image: suresheggogi/web-app:.*|image: suresheggogi/web-app:latest|' /root/docker-compose.yml

            docker compose pull webapp

            docker compose up -d webapp

            docker images suresheggogi/web-app --format '{{.ID}}' | awk '!seen[$0]++' | tail -n +3 | xargs -r docker rmi

            docker image prune -f
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
