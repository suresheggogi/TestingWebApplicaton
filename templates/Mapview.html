{% load static %}

<!DOCTYPE html>
<html>
    <head>
         <meta charset="utf-8" />
         <meta name="viewport" content="initial-scale=1, width=device-width" />
         <link rel="stylesheet" href="{% static 'css\Mapview.css' %}">
         
         <!-- Leaflet shpjs libraries -->
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script src="https://unpkg.com/shpjs@latest/dist/shp.min.js"></script> 
               
    </head>
   
    
    <body>
        <div class="container">

           <div class="slidelist">
                <div class="navilist">
                    
                    <!-- <a href="#"><img src="{% static 'img/layers.svg' %}" class="logoicon">Projects</a> -->
                    <a href="javascript:void(0)" onclick="openNav()"><img src="{% static 'img/layers.svg' %}" class="logoicon">Projects</a>
                    <div id="mySidenav" class="sidenav">
                        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
                        <a href="#">Amrut 1</a>
                        
                        <div style="border:1px solid #ccc; padding:10px;">
                            <h4>Tables in NeonDB</h4>
                          
                            <ul>{% for schema, table in tables %}
                                <li>{{ schema }}.{{ table }}</li>
                                {% empty %}
                                <li>No tables found.</li>
                                {% endfor %}
                            </ul>
                        </div>
                        
                        
                    </div>

                    <!-- <a href="#"><img src="{% static 'img/Mapview_icon.png' %}" alt="noimg" class="logoicon">Google Maap</a><br>
                    <a href="#"><img src="{% static 'img/Processig_icon.png' %}" alt="noimg" class="logoicon">Bing Map</a><br> -->
                    <a href="#"><img src="{% static 'img/Settings_icon.png' %}" alt="noimg" class="logoicon">Settings</a><br> 
                </div>
                
            </div> 

            <div class="mapviewer">
                <div id="mapid" > </div> 
                 <input type="file" id="inputfile" accept=".zip" />
                 
            </div>
            
            
            <div class="sliderbar" id="sildebar1">

                <div class="lablebox">
                    <label>
                        <input type="radio" name = "mapOption" class="checkboxbtn" onclick="showmap()">Show Map 
                    </label><br>

                    <label>
                        <input type="radio" name = "mapOption" class="checkboxbtn" onclick="showImage()">Show Satellite Image
                    </label></br>

                    
                </div>
               
                
                <div class="attributes" id="attributes1">
                    <div class="attr-table" id="attr-table1"></div>
                </div>
              
               
            </div>

            <div class="rightbar">
                
                 <div class="drawingcontrolers">
                    <a href="#"><img src="{% static 'img/man-user.svg' %}"alt="noimg" class="logoicon2"></a><br>
                    <a href="#"><img src="{% static 'img/pencil-edit-button.svg' %}"alt="noimg" class="logoicon2"></a><br>
                    <a href="#"><img src="{% static 'img/polyline.svg' %}"alt="noimg" class="logoicon2"></a><br>
                    <a href="#"><img src="{% static 'img/ruler.svg' %}"alt="noimg" class="logoicon2"></a><br>
                 </div>

            </div>  
               
        </div>
      
     <script src="{% static 'js/mapscript.js' %}"></script>
     
      
    </body>
    
</html>
